<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · UI Kit</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"></head><body>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('UI Kit','Componentes base e exemplos de gráficos.',`
<div class="grid cols-2">
  <article class="card"><h3>Componentes rápidos</h3><p class="muted">Badges, botões, inputs e cards.</p><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><span class="badge success">Success</span><span class="badge info">Info</span><span class="badge warn">Warn</span></div></article>
  <article class="card"><h3>Gráfico de barras</h3><div id="chart-bars" style="height:240px"></div></article>
</div>
<div class="grid cols-2" style="margin-top:16px">
  <article class="card"><h3>Gráfico de área</h3><div id="chart-area" style="height:240px"></div></article>
  <article class="card"><h3>Resumo</h3><p class="muted">ApexCharts pronto para widgets no template.</p></article>
</div>
`)
new ApexCharts(document.querySelector('#chart-bars'),{chart:{type:'bar',toolbar:{show:false}},series:[{name:'Projetos',data:[3,5,4,7,6]}],xaxis:{categories:['Jan','Fev','Mar','Abr','Mai']},colors:['#6366f1']}).render();
new ApexCharts(document.querySelector('#chart-area'),{chart:{type:'area',toolbar:{show:false}},series:[{name:'Atividade',data:[10,16,12,20,18,24]}],xaxis:{categories:['10h','12h','14h','16h','18h','20h']},colors:['#0ea5e9'],stroke:{curve:'smooth'}}).render();
</script><script src="assets/scripts/app.js"></script></body></html>
