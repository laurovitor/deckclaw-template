<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Form Select</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Form Select','Espelhando os exemplos mais comuns da página forms-select.',`
<div class="grid" style="gap:16px">
  <article class="card">
    <h3>Default Select</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Default select</label><select class="form-select"><option selected>Open this select menu</option><option>One</option><option>Two</option></select></div>
      <div class="col-md-4"><label class="form-label">Disabled select</label><select class="form-select" disabled><option selected>Disabled select</option></select></div>
      <div class="col-md-4"><label class="form-label">Multiple select</label><select class="form-select" multiple><option>One</option><option>Two</option><option>Three</option></select></div>
    </div>
  </article>

  <article class="card">
    <h3>Select Sizing</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Large select</label><select class="form-select form-select-lg"><option>Large select</option><option>One</option></select></div>
      <div class="col-md-4"><label class="form-label">Default select</label><select class="form-select"><option>Default select</option><option>One</option></select></div>
      <div class="col-md-4"><label class="form-label">Small select</label><select class="form-select form-select-sm"><option>Small select</option><option>One</option></select></div>
    </div>
  </article>

  <article class="card">
    <h3>Select with Input Group</h3>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Prepend</label><div class="input-group"><label class="input-group-text">Options</label><select class="form-select"><option selected>Choose...</option><option>One</option><option>Two</option></select></div></div>
      <div class="col-md-6"><label class="form-label">Append</label><div class="input-group"><select class="form-select"><option selected>Choose...</option><option>One</option><option>Two</option></select><label class="input-group-text">Select</label></div></div>
    </div>
  </article>

  <article class="card">
    <h3>Tom Select (estilo avançado tipo Select2)</h3>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Searchable</label><select id="ts-search"><option value="">Selecione</option><option>Product</option><option>Engineering</option><option>Operations</option><option>Support</option></select></div>
      <div class="col-md-6"><label class="form-label">Multiple tags</label><select id="ts-tags" multiple><option>React</option><option>TypeScript</option><option>Node.js</option><option>PostgreSQL</option><option>Docker</option></select></div>
    </div>
  </article>

  <article class="card">
    <h3>Validation States</h3>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Valid select</label><select class="form-select is-valid"><option selected>Looks good!</option><option>One</option></select></div>
      <div class="col-md-6"><label class="form-label">Invalid select</label><select class="form-select is-invalid"><option selected>Please choose one</option><option>One</option></select></div>
    </div>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="assets/scripts/app.js"></script>
<script>
new TomSelect('#ts-search',{create:false,sortField:{field:'text',direction:'asc'}});
new TomSelect('#ts-tags',{plugins:['remove_button'],create:true,persist:false});
</script></body></html>
