<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Form selects</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Form selects','Estilo e comportamento inspirados no Velzon (selects enriquecidos).',`
<div class="grid cols-2">
  <article class="card"><h3>Select padrão</h3>
    <div class="field"><label>Departamento</label><select><option>Produto</option><option>Engenharia</option><option>Operações</option></select></div>
    <div class="field"><label>Status</label><select><option>Ativo</option><option>Pausado</option></select></div>
  </article>
  <article class="card"><h3>Select avançado (search/tag)</h3>
    <div class="field"><label>Skills</label><select id="skillSelect" multiple><option>React</option><option>TypeScript</option><option>Node.js</option><option>PostgreSQL</option><option>Docker</option></select></div>
    <div class="field"><label>Workspace</label><select id="workspaceSelect"><option value="deckclaw">deckclaw</option><option value="ops">ops</option><option value="support">support</option></select></div>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="assets/scripts/app.js"></script>
<script>
new TomSelect('#skillSelect',{plugins:['remove_button'],create:true,persist:false});
new TomSelect('#workspaceSelect',{create:false,sortField:{field:'text',direction:'asc'}});
</script></body></html>
