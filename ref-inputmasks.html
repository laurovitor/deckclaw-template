<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Inputmasks</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Inputmasks','Espelhando a ideia da página de masks com blocos prontos para uso.',`
<div class="grid" style="gap:16px">
  <article class="card"><h3>Basic masks</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Date (DD/MM/YYYY)</label><input id="m-date" class="form-control" placeholder="00/00/0000"></div>
      <div class="col-md-4"><label class="form-label">Time (HH:mm)</label><input id="m-time" class="form-control" placeholder="00:00"></div>
      <div class="col-md-4"><label class="form-label">CEP</label><input id="m-cep" class="form-control" placeholder="00000-000"></div>
      <div class="col-md-4"><label class="form-label">CPF</label><input id="m-cpf" class="form-control" placeholder="000.000.000-00"></div>
      <div class="col-md-4"><label class="form-label">CNPJ</label><input id="m-cnpj" class="form-control" placeholder="00.000.000/0000-00"></div>
      <div class="col-md-4"><label class="form-label">Phone</label><input id="m-phone" class="form-control" placeholder="(00) 00000-0000"></div>
    </div>
  </article>

  <article class="card"><h3>Advanced masks</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Currency (BRL)</label><input id="m-money" class="form-control" placeholder="R$ 0,00"></div>
      <div class="col-md-4"><label class="form-label">IP Address</label><input id="m-ip" class="form-control" placeholder="000.000.000.000"></div>
      <div class="col-md-4"><label class="form-label">Credit Card</label><input id="m-card" class="form-control" placeholder="0000 0000 0000 0000"></div>
      <div class="col-md-4"><label class="form-label">Percent</label><input id="m-percent" class="form-control" placeholder="0%"></div>
      <div class="col-md-4"><label class="form-label">Custom code</label><input id="m-code" class="form-control" placeholder="AAA-0000"></div>
      <div class="col-md-4"><label class="form-label">Hex color</label><input id="m-hex" class="form-control" placeholder="#A1B2C3"></div>
    </div>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/imask"></script>
<script src="assets/scripts/app.js"></script>
<script>
IMask(document.getElementById('m-date'),{mask:'00/00/0000'});
IMask(document.getElementById('m-time'),{mask:'00:00'});
IMask(document.getElementById('m-cep'),{mask:'00000-000'});
IMask(document.getElementById('m-cpf'),{mask:'000.000.000-00'});
IMask(document.getElementById('m-cnpj'),{mask:'00.000.000/0000-00'});
IMask(document.getElementById('m-phone'),{mask:'(00) 00000-0000'});
IMask(document.getElementById('m-money'),{mask:Number,scale:2,thousandsSeparator:'.',radix:',',mapToRadix:['.'],normalizeZeros:true,padFractionalZeros:true,prefix:'R$ '});
IMask(document.getElementById('m-ip'),{mask:'000.000.000.000'});
IMask(document.getElementById('m-card'),{mask:'0000 0000 0000 0000'});
IMask(document.getElementById('m-percent'),{mask:'num %',blocks:{num:{mask:IMask.MaskedRange,from:0,to:100}}});
IMask(document.getElementById('m-code'),{mask:'aaa-0000',definitions:{a:/[A-Za-z]/}});
IMask(document.getElementById('m-hex'),{mask:/^#?[0-9A-Fa-f]{0,6}$/});
</script></body></html>
