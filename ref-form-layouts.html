<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Form layouts</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Form layouts','Layouts vertical, horizontal e grid inspirados no forms-layouts.',`
<div class="grid" style="gap:16px">
  <article class="card"><h3>Vertical Form</h3>
    <form class="row g-3">
      <div class="col-md-6"><label class="form-label">First name</label><input class="form-control"></div>
      <div class="col-md-6"><label class="form-label">Last name</label><input class="form-control"></div>
      <div class="col-12"><label class="form-label">Address</label><input class="form-control"></div>
      <div class="col-md-6"><label class="form-label">City</label><input class="form-control"></div>
      <div class="col-md-4"><label class="form-label">State</label><select class="form-select"><option>Choose...</option><option>PR</option></select></div>
      <div class="col-md-2"><label class="form-label">Zip</label><input class="form-control"></div>
      <div class="col-12"><button class="btn btn-primary" type="button">Submit</button></div>
    </form>
  </article>

  <article class="card"><h3>Horizontal Form</h3>
    <form>
      <div class="row mb-3"><label class="col-sm-3 col-form-label">Email</label><div class="col-sm-9"><input type="email" class="form-control" placeholder="email@empresa.com"></div></div>
      <div class="row mb-3"><label class="col-sm-3 col-form-label">Password</label><div class="col-sm-9"><input type="password" class="form-control" placeholder="••••••"></div></div>
      <div class="row mb-3"><label class="col-sm-3 col-form-label">Role</label><div class="col-sm-9"><select class="form-select"><option>Owner</option><option>Manager</option></select></div></div>
      <div class="row"><div class="col-sm-9 offset-sm-3"><button class="btn btn-secondary" type="button">Save</button></div></div>
    </form>
  </article>

  <article class="card"><h3>Form Grid + Inline</h3>
    <div class="row g-3 mb-4">
      <div class="col-md-4"><label class="form-label">Company</label><input class="form-control"></div>
      <div class="col-md-4"><label class="form-label">Department</label><select class="form-select"><option>Engineering</option></select></div>
      <div class="col-md-4"><label class="form-label">Phone</label><input class="form-control" placeholder="(00) 00000-0000"></div>
    </div>
    <form class="row row-cols-lg-auto g-3 align-items-center">
      <div class="col-12"><label class="visually-hidden" for="inlineUser">User</label><input id="inlineUser" class="form-control" placeholder="Username"></div>
      <div class="col-12"><label class="visually-hidden" for="inlineSel">Preference</label><select id="inlineSel" class="form-select"><option>Option 1</option><option>Option 2</option></select></div>
      <div class="col-12"><button class="btn btn-primary" type="button">Apply</button></div>
    </form>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/app.js"></script></body></html>
