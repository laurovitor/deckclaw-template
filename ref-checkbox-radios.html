<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Checkboxs e radios</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Checkboxs e radios','Espelhando os grupos e variações da página forms-checkboxs-radios.',`
<div class="grid" style="gap:16px">
  <article class="card">
    <h3>Default / Disabled / Right / Indeterminate</h3>
    <div class="row g-3">
      <div class="col-md-3">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="c1"><label class="form-check-label" for="c1">Default checkbox</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="c2" checked><label class="form-check-label" for="c2">Checked checkbox</label></div>
      </div>
      <div class="col-md-3">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="c3" disabled><label class="form-check-label" for="c3">Disabled checkbox</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="c4" disabled checked><label class="form-check-label" for="c4">Disabled checked checkbox</label></div>
      </div>
      <div class="col-md-3">
        <div class="d-flex justify-content-between align-items-center border rounded p-2"><label for="c5" class="m-0">Form Check Right</label><input class="form-check-input m-0" type="checkbox" id="c5"></div>
        <div class="d-flex justify-content-between align-items-center border rounded p-2 mt-2"><label for="c6" class="m-0">Disabled checked</label><input class="form-check-input m-0" type="checkbox" id="c6" checked disabled></div>
      </div>
      <div class="col-md-3">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="c7"><label class="form-check-label" for="c7">Indeterminate checkbox</label></div>
      </div>
    </div>
  </article>

  <article class="card">
    <h3>Color Checkboxes / Outline Style</h3>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="form-check"><input class="form-check-input" type="checkbox" checked style="accent-color:#0d6efd" id="cp1"><label class="form-check-label" for="cp1">Checkbox Primary</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked style="accent-color:#6c757d" id="cp2"><label class="form-check-label" for="cp2">Checkbox Secondary</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked style="accent-color:#198754" id="cp3"><label class="form-check-label" for="cp3">Checkbox Success</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked style="accent-color:#ffc107" id="cp4"><label class="form-check-label" for="cp4">Checkbox Warning</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked style="accent-color:#dc3545" id="cp5"><label class="form-check-label" for="cp5">Checkbox Danger</label></div>
      </div>
      <div class="col-md-6">
        <div class="border rounded p-2 mb-2"><input class="btn-check" id="oc1" type="checkbox"><label class="btn btn-outline-primary w-100" for="oc1">Checkbox Outline Primary</label></div>
        <div class="border rounded p-2 mb-2"><input class="btn-check" id="oc2" type="checkbox"><label class="btn btn-outline-secondary w-100" for="oc2">Checkbox Outline Secondary</label></div>
        <div class="border rounded p-2 mb-2"><input class="btn-check" id="oc3" type="checkbox"><label class="btn btn-outline-success w-100" for="oc3">Checkbox Outline Success</label></div>
        <div class="border rounded p-2 mb-2"><input class="btn-check" id="oc4" type="checkbox"><label class="btn btn-outline-warning w-100" for="oc4">Checkbox Outline Warning</label></div>
        <div class="border rounded p-2"><input class="btn-check" id="oc5" type="checkbox"><label class="btn btn-outline-danger w-100" for="oc5">Checkbox Outline Danger</label></div>
      </div>
    </div>
  </article>

  <article class="card">
    <h3>Default / Disabled / Right Radios</h3>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="form-check"><input class="form-check-input" type="radio" name="r1" id="r1a"><label class="form-check-label" for="r1a">Default radio</label></div>
        <div class="form-check"><input class="form-check-input" type="radio" name="r1" id="r1b" checked><label class="form-check-label" for="r1b">Default checked radio</label></div>
      </div>
      <div class="col-md-4">
        <div class="form-check"><input class="form-check-input" type="radio" name="r2" id="r2a" disabled><label class="form-check-label" for="r2a">Disabled radio</label></div>
        <div class="form-check"><input class="form-check-input" type="radio" name="r2" id="r2b" checked disabled><label class="form-check-label" for="r2b">Disabled checked radio</label></div>
      </div>
      <div class="col-md-4">
        <div class="d-flex justify-content-between align-items-center border rounded p-2"><label for="r3a" class="m-0">Form Radio Right</label><input class="form-check-input m-0" type="radio" name="r3" id="r3a"></div>
        <div class="d-flex justify-content-between align-items-center border rounded p-2 mt-2"><label for="r3b" class="m-0">Disabled checked radio</label><input class="form-check-input m-0" type="radio" name="r3" id="r3b" checked disabled></div>
      </div>
    </div>
  </article>

  <article class="card">
    <h3>Switches (default, sizes, colors, custom)</h3>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s1"><label class="form-check-label" for="s1">Default switch input</label></div>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s2" checked><label class="form-check-label" for="s2">Checked switch input</label></div>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s3" disabled><label class="form-check-label" for="s3">Disabled switch input</label></div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Switch sizes</label>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="ssm"><label class="form-check-label" for="ssm">Small</label></div>
        <div class="form-check form-switch fs-5"><input class="form-check-input" type="checkbox" id="smd" checked><label class="form-check-label" for="smd">Medium</label></div>
        <div class="form-check form-switch fs-4"><input class="form-check-input" type="checkbox" id="slg" checked><label class="form-check-label" for="slg">Large</label></div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Switch colors</label>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" checked style="accent-color:#0d6efd" id="sc1"><label class="form-check-label" for="sc1">Primary</label></div>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" checked style="accent-color:#198754" id="sc2"><label class="form-check-label" for="sc2">Success</label></div>
        <div class="form-check form-switch"><input class="form-check-input" type="checkbox" checked style="accent-color:#dc3545" id="sc3"><label class="form-check-label" for="sc3">Danger</label></div>
      </div>
    </div>
  </article>

  <article class="card">
    <h3>Inline / Without labels / Toggle Buttons</h3>
    <div class="mb-3">
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" id="i1"><label class="form-check-label" for="i1">1</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" id="i2"><label class="form-check-label" for="i2">2</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" id="i3" disabled><label class="form-check-label" for="i3">3 (disabled)</label></div>
    </div>
    <div class="mb-3">
      <input class="form-check-input me-2" type="checkbox" value="" aria-label="Checkbox without label">
      <input class="form-check-input me-2" type="radio" name="nolabel" value="" aria-label="Radio without label">
      <input class="form-check-input" type="checkbox" value="" aria-label="Switch without label" checked>
    </div>
    <div class="btn-group" role="group" aria-label="Toggle">
      <input type="checkbox" class="btn-check" id="tb1" checked><label class="btn btn-outline-primary" for="tb1">Checked</label>
      <input type="radio" class="btn-check" name="tb" id="tb2"><label class="btn btn-outline-secondary" for="tb2">Radio</label>
      <input type="checkbox" class="btn-check" id="tb3" disabled><label class="btn btn-outline-dark" for="tb3">Disabled</label>
    </div>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/app.js"></script>
<script>
const ind = document.getElementById('c7');
if (ind) ind.indeterminate = true;
</script></body></html>
