<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Files uploads</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"><link rel="stylesheet" href="https://unpkg.com/dropzone@5/dist/min/dropzone.min.css"><link href="https://unpkg.com/filepond@^4/dist/filepond.css" rel="stylesheet"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Files uploads','Dropzone + FilePond no padrão da página de upload do Velzon.',`
<div class="grid" style="gap:16px">
  <article class="card"><h3>Dropzone</h3><p class="muted">Drop files here or click to upload.</p><form action="#" class="dropzone" id="dzUpload"></form></article>
  <article class="card"><h3>FilePond · Multiple</h3><p class="muted">Drag & drop com preview e UX suave.</p><input type="file" id="pondMulti" multiple></article>
  <article class="card"><h3>FilePond · Profile picture</h3><p class="muted">Variação para avatar/imagem única.</p><input type="file" id="pondSingle" accept="image/*"></article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
<script src="https://unpkg.com/filepond@^4/dist/filepond.js"></script>
<script src="assets/scripts/app.js"></script>
<script>
Dropzone.autoDiscover=false;
new Dropzone('#dzUpload',{url:'https://httpbin.org/post',addRemoveLinks:true,dictDefaultMessage:'Drop files here or click to upload.'});
FilePond.create(document.querySelector('#pondMulti'));
FilePond.create(document.querySelector('#pondSingle'));
</script></body></html>
