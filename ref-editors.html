<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Editors</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
</head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Editors','Editor rico para textos longos e notas.',`
<div class='grid cols-2'>
 <article class='card'><h3>Quill Editor</h3><div id='editor' style='height:220px;background:#fff;border:1px solid var(--border);border-radius:8px'></div></article>
 <article class='card'><h3>Preview</h3><div id='editorPreview' class='muted'>Digite no editor para visualizar aqui.</div></article>
</div>
`)
</script><script src="assets/scripts/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
<script>const q=new Quill("#editor",{theme:"snow"});q.on("text-change",()=>{document.querySelector("#editorPreview").textContent=q.getText().trim()||"Digite no editor para visualizar aqui."});</script>
</body></html>
