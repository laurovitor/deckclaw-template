<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Validation</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Validation','Modelo de validação alinhado ao padrão visual dos exemplos corporativos.',`
<div class="grid" style="gap:16px">
  <article class="card"><h3>Bootstrap native validation</h3>
    <form class="row g-3 needs-validation" id="bsVal" novalidate>
      <div class="col-md-4"><label class="form-label">Nome</label><input class="form-control" required><div class="invalid-feedback">Informe o nome.</div></div>
      <div class="col-md-4"><label class="form-label">Email</label><input type="email" class="form-control" required><div class="invalid-feedback">Informe um email válido.</div></div>
      <div class="col-md-4"><label class="form-label">Cidade</label><select class="form-select" required><option value="">Escolha...</option><option>Curitiba</option></select><div class="invalid-feedback">Selecione a cidade.</div></div>
      <div class="col-md-6"><label class="form-label">Senha</label><input type="password" class="form-control" minlength="8" required><div class="invalid-feedback">Mínimo de 8 caracteres.</div></div>
      <div class="col-md-6"><label class="form-label">Confirmar senha</label><input type="password" class="form-control" required><div class="invalid-feedback">Confirme a senha.</div></div>
      <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" required id="terms"><label class="form-check-label" for="terms">Aceito os termos</label><div class="invalid-feedback">Você precisa aceitar os termos.</div></div></div>
      <div class="col-12"><button class="btn btn-primary" type="submit">Validar formulário</button></div>
    </form>
  </article>

  <article class="card"><h3>Realtime validation (JustValidate)</h3>
    <form id="realtimeVal" class="row g-3">
      <div class="col-md-4"><label class="form-label">Workspace slug</label><input id="rtSlug" class="form-control" placeholder="meu-workspace"></div>
      <div class="col-md-4"><label class="form-label">Telefone</label><input id="rtPhone" class="form-control" placeholder="(00) 00000-0000"></div>
      <div class="col-md-4"><label class="form-label">URL</label><input id="rtUrl" class="form-control" placeholder="https://deckclaw.app.br"></div>
      <div class="col-12"><button class="btn btn-secondary" type="submit">Testar regras</button></div>
    </form>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/just-validate@4.3.0/dist/just-validate.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/imask"></script>
<script src="assets/scripts/app.js"></script>
<script>
(() => {
  const form = document.getElementById('bsVal');
  form.addEventListener('submit', e => {
    e.preventDefault();
    if (!form.checkValidity()) {
      e.stopPropagation();
    }
    form.classList.add('was-validated');
  });
})();
IMask(document.getElementById('rtPhone'),{mask:'(00) 00000-0000'});
const v = new JustValidate('#realtimeVal');
v
 .addField('#rtSlug',[{rule:'required'},{rule:'customRegexp',value:/^[a-z0-9-]{3,}$/}])
 .addField('#rtPhone',[{rule:'required'},{rule:'minLength',value:15}])
 .addField('#rtUrl',[{rule:'required'},{rule:'customRegexp',value:/^https?:\/\//}])
 .onSuccess(()=>alert('Validação ok ✅'));
</script></body></html>
