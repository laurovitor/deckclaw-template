<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Remix Icons</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Remix Icons','Amostra rápida dos ícones padrão do template.',`
<div class="card">
  <h3>Ícones base</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px">
    ${[
      'ri-dashboard-line','ri-briefcase-4-line','ri-folder-3-line','ri-team-line','ri-user-search-line','ri-robot-2-line','ri-settings-3-line','ri-chat-3-line','ri-notification-3-line','ri-arrow-left-s-line','ri-arrow-right-s-line','ri-more-2-fill','ri-delete-bin-6-line'
    ].map(n=>`<div style="border:1px solid #e2e8f0;border-radius:10px;padding:10px;display:flex;align-items:center;gap:8px"><i class="ri ${n}"></i><code style="font-size:12px">${n}</code></div>`).join('')}
  </div>
</div>
`)
</script><script src="assets/scripts/app.js"></script></body></html>
