<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Forms</title><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Forms','Inputs, selects, textarea e OTP com estados visuais.',`
