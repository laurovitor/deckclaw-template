<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeckClaw · Suporte</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg" />
  <link rel="stylesheet" href="assets/styles/base.css" />
  <link rel="stylesheet" href="assets/styles/components.css" />
</head>
<body>
  <main class="public-page">
    <section class="public-card" style="max-width:860px">
      <h1>Suporte</h1>
      <p class="muted">FAQ + formulário de contato.</p>
      <h3>FAQ</h3>
      <ul class="list">
        <li><strong>Como troco de workspace?</strong> Use o menu do perfil.</li>
        <li><strong>Como criar usuário?</strong> Vá em Usuários e envie convite.</li>
        <li><strong>Como falar com suporte?</strong> Use o formulário abaixo.</li>
      </ul>
      <h3>Contato</h3>
      <div class="field"><label>Nome</label><input type="text" placeholder="Seu nome" /></div>
      <div class="field"><label>Email</label><input type="email" placeholder="voce@empresa.com" /></div>
      <div class="field"><label>Mensagem</label><textarea rows="4" placeholder="Descreva sua dúvida"></textarea></div>
      <button class="btn btn-primary">Enviar</button>
    </section>
  </main>
  <footer class="public-footer">
    <div class="footer-left"><span class="footer-brand"><img class="footer-brand-icon" src="assets/icons/brand.svg" alt="">DeckClaw</span> · <span class="footer-version">v1.1.1-build</span></div>
    <div class="footer-right"><a href="support.html">suporte</a><span>-</span><a href="https://deckclaw.api.br" target="_blank">apidoc</a><span>-</span><a href="terms.html">terms</a></div>
  </footer>
</body>
</html>
