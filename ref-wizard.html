<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Wizard</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Wizard','Wizard em etapas com navegação, barra de progresso e validação básica.',`
<article class="card">
  <h3>Setup Wizard</h3>
  <div class="progress mb-3" role="progressbar"><div id="wizProgress" class="progress-bar" style="width:33%">Etapa 1/3</div></div>

  <div class="tab-content border rounded p-3 bg-white">
    <section class="tab-pane fade show active" id="step1"><h5>Etapa 1 · Conta</h5><div class="row g-3"><div class="col-md-6"><label class="form-label">Nome</label><input class="form-control" id="wName"></div><div class="col-md-6"><label class="form-label">Email</label><input class="form-control" id="wEmail"></div></div></section>
    <section class="tab-pane fade" id="step2"><h5>Etapa 2 · Workspace</h5><div class="row g-3"><div class="col-md-6"><label class="form-label">Workspace</label><input class="form-control" id="wWorkspace"></div><div class="col-md-6"><label class="form-label">Slug</label><input class="form-control" id="wSlug"></div></div></section>
    <section class="tab-pane fade" id="step3"><h5>Etapa 3 · Finalização</h5><p class="muted mb-2">Revise os dados e conclua.</p><ul><li>Conta criada</li><li>Workspace configurado</li><li>Permissões iniciais aplicadas</li></ul></section>
  </div>

  <div class="d-flex justify-content-between mt-3">
    <button class="btn btn-secondary" id="wizPrev" disabled>Voltar</button>
    <button class="btn btn-primary" id="wizNext">Próximo</button>
  </div>
</article>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/app.js"></script>
<script>
const steps=['step1','step2','step3']; let idx=0;
const prev=document.getElementById('wizPrev'); const next=document.getElementById('wizNext'); const bar=document.getElementById('wizProgress');
function render(){steps.forEach((id,i)=>{const el=document.getElementById(id); el.classList.toggle('show',i===idx); el.classList.toggle('active',i===idx);}); prev.disabled=idx===0; next.textContent=idx===steps.length-1?'Concluir':'Próximo'; const pct=((idx+1)/steps.length)*100; bar.style.width=pct+'%'; bar.textContent=`Etapa ${idx+1}/${steps.length}`;}
prev.onclick=()=>{if(idx>0){idx--;render();}};
next.onclick=()=>{if(idx<steps.length-1){idx++;render();}else{alert('Wizard concluído ✅')}};
render();
</script></body></html>
