<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Referência · Basic Elements</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Referência · Basic Elements','Espelhando os exemplos da página forms-elements do Velzon.',`
<div class="grid" style="gap:16px">
  <article class="card">
    <h3>Basic Input</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Input with Label</label><input class="form-control" value="Input with Label"></div>
      <div class="col-md-4"><label class="form-label">Input with Placeholder</label><input class="form-control" placeholder="Input placeholder"></div>
      <div class="col-md-4"><label class="form-label">Input with Value</label><input class="form-control" value="Input value"></div>
      <div class="col-md-4"><label class="form-label">Readonly Plain Text Input</label><input class="form-control-plaintext" readonly value="email@example.com"></div>
      <div class="col-md-4"><label class="form-label">Readonly Input</label><input class="form-control" readonly value="Readonly value"></div>
      <div class="col-md-4"><label class="form-label">Disabled Input</label><input class="form-control" disabled value="Disabled value"></div>
      <div class="col-md-4"><label class="form-label">Input with Icon</label><div class="input-group"><span class="input-group-text">@</span><input class="form-control" placeholder="username"></div></div>
      <div class="col-md-4"><label class="form-label">Input with Icon Right</label><div class="input-group"><input class="form-control" placeholder="amount"><span class="input-group-text">.00</span></div></div>
      <div class="col-md-4"><label class="form-label">Input Date</label><input type="date" class="form-control"></div>
      <div class="col-md-4"><label class="form-label">Input Time</label><input type="time" class="form-control"></div>
      <div class="col-md-4"><label class="form-label">Input Password</label><input type="password" class="form-control" value="12345678"></div>
      <div class="col-md-4"><label class="form-label">Color Picker</label><input type="color" class="form-control form-control-color" value="#0d6efd"></div>
      <div class="col-12"><label class="form-label">Example Textarea</label><textarea class="form-control" rows="3" placeholder="Example textarea"></textarea><div class="form-text">Must be 8-20 characters long.</div></div>
      <div class="col-md-4"><label class="form-label">Rounded Input</label><input class="form-control rounded-pill" placeholder="Rounded"></div>
      <div class="col-md-4"><label class="form-label">Floating Input</label><div class="form-floating"><input class="form-control" id="f1" placeholder="name@example.com"><label for="f1">Email address</label></div></div>
      <div class="col-md-4"><label class="form-label">Datalist example</label><input class="form-control" list="datalistOptions" placeholder="Type to search..."><datalist id="datalistOptions"><option value="San Francisco"><option value="New York"><option value="Seattle"></datalist></div>
    </div>
  </article>

  <article class="card">
    <h3>Input Sizes + File Inputs</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">Small</label><input class="form-control form-control-sm" placeholder=".form-control-sm"></div>
      <div class="col-md-4"><label class="form-label">Default</label><input class="form-control" placeholder="Default size"></div>
      <div class="col-md-4"><label class="form-label">Large</label><input class="form-control form-control-lg" placeholder=".form-control-lg"></div>
      <div class="col-md-4"><label class="form-label">Default File Input</label><input class="form-control" type="file"></div>
      <div class="col-md-4"><label class="form-label">Multiple Files Input</label><input class="form-control" type="file" multiple></div>
      <div class="col-md-4"><label class="form-label">Disabled File Input</label><input class="form-control" type="file" disabled></div>
      <div class="col-md-4"><label class="form-label">Small File Input</label><input class="form-control form-control-sm" type="file"></div>
      <div class="col-md-4"><label class="form-label">Default Size File Input</label><input class="form-control" type="file"></div>
      <div class="col-md-4"><label class="form-label">Large File Input</label><input class="form-control form-control-lg" type="file"></div>
    </div>
  </article>

  <article class="card">
    <h3>Input Group</h3>
    <div class="row g-3">
      <div class="col-md-4"><label class="form-label">@ username</label><div class="input-group"><span class="input-group-text">@</span><input class="form-control" placeholder="Username"></div></div>
      <div class="col-md-4"><label class="form-label">Email suffix</label><div class="input-group"><input class="form-control" placeholder="Username"><span class="input-group-text">@example.com</span></div></div>
      <div class="col-md-4"><label class="form-label">Currency</label><div class="input-group"><span class="input-group-text">$</span><input class="form-control"><span class="input-group-text">.00</span></div></div>
      <div class="col-md-6"><label class="form-label">With textarea</label><div class="input-group"><span class="input-group-text">With textarea</span><textarea class="form-control"></textarea></div></div>
      <div class="col-md-6"><label class="form-label">Vanity URL</label><div class="input-group"><span class="input-group-text">https://example.com/users/</span><input class="form-control" placeholder="username"></div></div>
      <div class="col-md-4"><label class="form-label">Small group</label><div class="input-group input-group-sm"><span class="input-group-text">@</span><input class="form-control" placeholder="small"></div></div>
      <div class="col-md-4"><label class="form-label">Default group</label><div class="input-group"><span class="input-group-text">@</span><input class="form-control" placeholder="default"></div></div>
      <div class="col-md-4"><label class="form-label">Large group</label><div class="input-group input-group-lg"><span class="input-group-text">@</span><input class="form-control" placeholder="large"></div></div>
      <div class="col-md-6"><label class="form-label">Checkbox in addon</label><div class="input-group"><span class="input-group-text"><input class="form-check-input mt-0" type="checkbox"></span><input class="form-control" placeholder="Text input"></div></div>
      <div class="col-md-6"><label class="form-label">Radio in addon</label><div class="input-group"><span class="input-group-text"><input class="form-check-input mt-0" type="radio" name="addon-radio"></span><input class="form-control" placeholder="Text input"></div></div>
      <div class="col-md-6"><label class="form-label">Select + input</label><div class="input-group"><button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Select</button><ul class="dropdown-menu"><li><a class="dropdown-item" href="#">One</a></li><li><a class="dropdown-item" href="#">Two</a></li></ul><input class="form-control" placeholder="Options"></div></div>
      <div class="col-md-6"><label class="form-label">File input group</label><div class="input-group"><input type="file" class="form-control"><button class="btn btn-outline-secondary">Upload</button></div></div>
    </div>
  </article>
</div>
`)
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/app.js"></script></body></html>
