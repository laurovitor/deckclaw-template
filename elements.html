<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DeckClaw · Elementos básicos</title><link rel="icon" type="image/svg+xml" href="assets/icons/brand.svg"><link rel="stylesheet" href="assets/styles/base.css"><link rel="stylesheet" href="assets/styles/components.css"></head><body>
<script src="assets/scripts/layout.js"></script><script>
renderLayout('Elementos básicos','Referência visual inspirada no estilo clean corporativo (base para forms).',`
<div class="grid cols-2">
  <article class="card">
    <h3>Inputs</h3>
    <div class="field"><label>Texto</label><input type="text" placeholder="Digite aqui"></div>

    <label style="display:flex;align-items:center;gap:8px;margin-top:8px"><input type="radio" name="x"> Opção A</label>
  </article>
</div>
